<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ezList - Legal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        p {
            color: #888;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #333;
            transition: background 0.2s, border-color 0.2s;
            font-size: 1rem;
        }
        a:hover {
            background: #222;
            border-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ezList</h1>
        <p>Smart Grocery Lists</p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
        </div>
    </div>
</body>
</html>
